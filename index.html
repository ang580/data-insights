<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e17;color:#c8d6e5;font-family:'Segoe UI','Hiragino Sans',sans-serif;line-height:1.8}
a{color:#00d2ff;text-decoration:none}a:hover{text-decoration:underline}
.container{max-width:1100px;margin:0 auto;padding:0 24px}
header{background:#0a0e17;border-bottom:1px solid #1e2a3a;padding:16px 0;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
header .container{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap}
.logo{font-size:1.2rem;font-weight:700;color:#fff}.logo span{color:#00d2ff}
.tags{display:flex;gap:8px;margin-top:4px}
.tag{background:#1a1f36;color:#00d2ff;padding:2px 10px;border-radius:12px;font-size:.72rem}
nav a{color:#8892b0;margin-left:20px;font-size:.88rem}nav a:hover{color:#00d2ff}
.hero{text-align:center;padding:72px 24px 48px;background:linear-gradient(180deg,#0a0e17 0%,#111827 100%)}
.hero h1{font-size:2.2rem;color:#fff;line-height:1.4;margin-bottom:16px}
.hero p{font-size:1.05rem;color:#8892b0;max-width:640px;margin:0 auto 32px}
.stats{display:flex;justify-content:center;gap:48px;flex-wrap:wrap;margin:32px 0}
.stats .item .num{font-size:2rem;font-weight:700;color:#00d2ff}
.stats .item .label{font-size:.8rem;color:#5a6a80}
.section-title{font-size:1.5rem;color:#fff;text-align:center;margin:56px 0 28px;position:relative}
.section-title::after{content:'';display:block;width:60px;height:3px;background:#00d2ff;margin:12px auto 0}
.report-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:24px;margin:0 auto;max-width:1100px;padding:0 24px}
.report-card{background:#111827;border:1px solid #1e2a3a;border-radius:14px;padding:28px;transition:all .3s}
.report-card:hover{border-color:#00d2ff;transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,210,255,.1)}
.report-card .category{font-size:.72rem;color:#00d2ff;font-weight:600;text-transform:uppercase;letter-spacing:1px}
.report-card h3{color:#fff;font-size:1.15rem;margin:8px 0}
.report-card p{color:#8892b0;font-size:.88rem;margin-bottom:16px}
.report-card .btn{display:inline-block;background:#00d2ff22;color:#00d2ff;padding:8px 20px;border-radius:8px;font-size:.85rem;font-weight:600;transition:background .2s}
